<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
    <style>
      *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
      :root{--red:#E8192C;--red-dark:#B5101E;--red-light:#FF4D5E;--dark-bg:#111114;--card:#18181C;--card-border:#2A2A30;--surface:#1F1F24;--text:#F5F5F7;--muted:#8E8E9A;--faint:#4A4A55;--success:#22C55E;--warning:#F59E0B;--info:#3B82F6}
      html,body,#root{height:100%}
      body{font-family:'DM Sans',sans-serif;background:var(--dark-bg);color:var(--text);-webkit-font-smoothing:antialiased}
      h1,h2,h3,h4,h5{font-family:'Syne',sans-serif}
      ::-webkit-scrollbar{width:5px;height:5px}
      ::-webkit-scrollbar-track{background:var(--dark-bg)}
      ::-webkit-scrollbar-thumb{background:var(--card-border);border-radius:4px}
      input,select,textarea,button{font-family:'DM Sans',sans-serif}
      input:focus,select:focus,textarea:focus{outline:none;border-color:var(--red)!important;box-shadow:0 0 0 3px rgba(232,25,44,.15)!important}
      @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
      @keyframes heartbeat{0%,100%{transform:scale(1)}14%{transform:scale(1.1)}28%{transform:scale(1)}42%{transform:scale(1.08)}}
      @keyframes spin{to{transform:rotate(360deg)}}
      @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(232,25,44,.4)}50%{box-shadow:0 0 0 12px rgba(232,25,44,0)}}
      .fade-up{animation:fadeUp .4s ease forwards}
    </style>
    <meta name="theme-color" content="#111114" />
    <meta name="description" content="BloodLink - Blood Donation Platform" />
    <title>BloodLink 🩸</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
